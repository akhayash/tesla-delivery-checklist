<!doctype html>
<html lang="ja" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tesla-delivery-checklist/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0D0F" />
    <meta name="description" content="Tesla 納車チェックリスト：Model Y L など納車受け取り時の確認・撮影・レポート出力ができるモバイル Web アプリ。" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tesla 納車チェック" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Tesla 納車チェックリスト</title>
    <script>
      // PWA service worker registration with forced update handoff.
      // Existing users running an older service worker (pre-skipWaiting) get
      // upgraded to the new SW on their next visit without needing manual
      // cache clearing. The new SW already declares skipWaiting/clientsClaim
      // via workbox config; this script ensures any installed-but-waiting SW
      // is told to activate immediately, and the page reloads once it does.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const reg = await navigator.serviceWorker.register(
              '/tesla-delivery-checklist/sw.js',
              { scope: '/tesla-delivery-checklist/' }
            );
            if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            reg.addEventListener('updatefound', () => {
              const incoming = reg.installing;
              if (!incoming) return;
              incoming.addEventListener('statechange', () => {
                if (incoming.state === 'installed' && navigator.serviceWorker.controller) {
                  incoming.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
            let refreshing = false;
            const hadController = !!navigator.serviceWorker.controller;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              // Skip the initial clientsClaim controllerchange on first install,
              // otherwise tests and first-time visitors get an unwanted reload.
              if (!hadController) return;
              if (refreshing) return;
              refreshing = true;
              window.location.reload();
            });
          } catch (err) {
            console.warn('[sw] registration failed', err);
          }
        });
      }
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>JavaScript を有効にしてご利用ください。</noscript>
  </body>
</html>
