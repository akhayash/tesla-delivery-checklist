name: 機能要望
description: 新機能・改善の提案
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案する方法
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 想定優先度
      options:
        - 🔴 高（納車前に欲しい）
        - 🟡 中（あると良い）
        - 🟢 低（将来的に）
    validations:
      required: true
